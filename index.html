<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anh Dang | Portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .title {
      font-size: 1.1rem;
      color: #58a6ff;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }
    .tagline {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.75rem 1.5rem;
      font-size: 0.95rem;
      color: #58a6ff;
      margin-bottom: 2rem;
    }
    .links a {
      display: inline-block;
      margin: 0.4rem;
      padding: 0.5rem 1.2rem;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      text-decoration: none;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .links a:hover { border-color: #58a6ff; color: #58a6ff; }
    .footer { margin-top: 3rem; font-size: 0.8rem; color: #484f58; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Anh Dang</h1>
    <div class="title">Data Analyst II &rarr; Data Scientist</div>
    <p class="tagline">
      Building toward a career in ML &amp; data science.<br />
      Georgia Tech OMSCS &middot; U.S. Army Reserve &middot; Houston, TX
    </p>
    <div class="badge">&#128679; Portfolio coming soon</div>
    <div class="links">
      <a href="https://github.com/anhtdang92" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/anhtdang92" target="_blank">LinkedIn</a>
    </div>
    <div class="footer">Last updated March 2026</div>
  </div>
</body>
</html>
