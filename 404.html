<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Anh Dang</title>
<meta name="theme-color" content="#04070d">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#04070d;--card:#0b1120;--border:#2a3f5a;--text:#eef3f9;--muted:#9db5cc;--green:#00ff87;--cyan:#00d4ff;--purple:#e040fb;--ff:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--ff);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.container{max-width:480px}
.code{font-family:var(--mono);font-size:clamp(72px,15vw,120px);font-weight:800;background:linear-gradient(135deg,var(--purple),var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:16px}
h1{font-size:24px;font-weight:600;margin-bottom:8px}
p{font-size:16px;color:var(--muted);margin-bottom:32px;line-height:1.6}
a{font-family:var(--mono);font-size:14px;padding:12px 28px;border-radius:8px;background:var(--green);color:var(--bg);font-weight:700;text-decoration:none;display:inline-block;transition:all 0.3s}
a:hover{background:#33ff99;transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,255,135,0.3)}
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/">Back to Portfolio</a>
</div>
</body>
</html>
